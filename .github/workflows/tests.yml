name: Unit Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        env:
          POKEAPI_BASE_URL: http://localhost/api/v2/
          POKEAPI_TIMEOUT: "30"
          POKEAPI_MAX_WORKERS: "4"
        run: |
          python -m unittest \
            mcp_server.tests.application.use_cases.test_build_team \
            mcp_server.tests.application.use_cases.test_rankings \
            mcp_server.tests.mcp.tools.test_tools \
            mcp_server.tests.infrastructure.pokeapi.test_fetchers \
            -v
